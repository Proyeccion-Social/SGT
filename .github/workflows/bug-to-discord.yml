# .github/workflows/bug-to-discord.yml
name: Bug to Discord

on:
  issues:
    types: [opened, closed, labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    if: |
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'bug')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'bug')
    permissions:
      issues: write
    steps:
      - name: Post template comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `👋 Hola @${{ github.event.issue.user.login }}, gracias por reportar este bug.

            Por favor completa la siguiente información para que podamos atenderte más rápido:

            ---

            **📋 Descripción del bug**
            > ¿Qué ocurrió exactamente?

            **🔁 Pasos para reproducirlo**
            > 1.
            > 2.

            **✅ Comportamiento esperado**
            > ¿Qué debería haber pasado?

            **📱 Entorno**
            > App · Versión · SO · Navegador (si aplica)

            **📎 Evidencia**
            > Adjunta capturas, videos o logs si tienes.`
            })

  discord:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'bug') ||
      github.event.label.name == 'bug'
    steps:
      - name: Notify Discord
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            COLOR=15548997
            STATUS="🔴 Nuevo bug reportado"
          elif [ "${{ github.event.action }}" = "closed" ]; then
            COLOR=5763719
            STATUS="✅ Bug cerrado"
          else
            COLOR=16776960
            STATUS="🏷️ Bug etiquetado por **${{ github.event.issue.user.login }}**"
          fi

          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"🐛 Bug #${{ github.event.issue.number }}: ${{ github.event.issue.title }}\",
              \"url\": \"${{ github.event.issue.html_url }}\",
              \"description\": \"$STATUS\",
              \"color\": $COLOR,
              \"footer\": { \"text\": \"Ver detalles en GitHub\" },
              \"timestamp\": \"${{ github.event.issue.created_at }}\"
            }]
          }"
