# .github/workflows/bug-to-discord.yml
name: Bug to Discord

on:
  issues:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'bug')
    steps:
      - name: Notify Discord
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            COLOR=15548997
            STATUS="🔴 Nuevo bug reportado"
          else
            COLOR=5763719
            STATUS="✅ Bug cerrado"
          fi

          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"🐛 Bug #${{ github.event.issue.number }}: ${{ github.event.issue.title }}\",
              \"url\": \"${{ github.event.issue.html_url }}\",
              \"description\": \"$STATUS por **${{ github.event.issue.user.login }}**\",
              \"color\": $COLOR,
              \"footer\": { \"text\": \"Ver detalles en GitHub\" },
              \"timestamp\": \"${{ github.event.issue.created_at }}\"
            }]
          }"
