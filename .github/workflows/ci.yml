name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint · Build · Test
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Lint ──────────────────────────────────────────────────────────────────
      # Run without --fix so the pipeline fails on lint errors instead of
      # silently patching them in CI.
      - name: Lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── Unit tests + coverage ─────────────────────────────────────────────────
      - name: Unit tests
        run: npm run test:cov

      # ── Coverage report artifact ──────────────────────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
