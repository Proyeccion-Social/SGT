name: nightly-cleanup-notifications

on:
  schedule:
    - cron: '0 7 * * *'   # 2:00 AM Bogotá (UTC-5) = 07:00 UTC
  workflow_dispatch:        # para poder ejecutarlo manualmente 

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente de PostgreSQL
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Ejecutar limpieza de notificaciones
        run: psql "$DATABASE_URL" -c "SELECT clean_old_app_notifications();"
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}